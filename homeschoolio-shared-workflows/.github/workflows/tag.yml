name: Tag Module Versions

on:
  workflow_call:
    inputs:
      base-ref:
        description: Base branch to diff against for version bump detection
        type: string
        default: "main"
      tag-prefix:
        description: Prefix for module Git tags
        type: string
        default: "modules/"
    secrets:
      github-token:
        required: true
    outputs:
      tags-created:
        description: Newline-separated list of created tags; empty if no bumps detected
        value: ${{ jobs.tag.outputs.tags-created }}

jobs:
  tag:
    name: Tag Module Versions
    runs-on: ubuntu-latest
    outputs:
      tags-created: ${{ steps.create-tags.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.github-token }}

      - name: Detect version bumps
        id: detect
        run: |
          git fetch origin ${{ inputs.base-ref }}:${{ inputs.base-ref }} 2>/dev/null || true
          CHANGED=$(git diff ${{ inputs.base-ref }}..HEAD --name-only 2>/dev/null \
            | grep 'modules/.*/version\.tf' || true)
          echo "changed-files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Detected version changes in:"
          echo "$CHANGED"

      - name: Validate and create tags
        id: create-tags
        run: |
          TAGS_CREATED=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            MODULE=$(echo "$file" | sed -E 's|modules/([^/]+)/version\.tf|\1|')
            NEW_VER=$(grep -oP '(?<=module_version = ")[^"]+' "$file" 2>/dev/null || true)

            if [ -z "$NEW_VER" ]; then
              echo "::warning::Could not extract version from $file — skipping"
              continue
            fi

            # Validate semver format
            if ! echo "$NEW_VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid semver format '$NEW_VER' in $file"
              exit 1
            fi

            TAG="${{ inputs.tag-prefix }}${MODULE}/${NEW_VER}"

            # Check if tag already exists
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "::notice::Tag $TAG already exists — skipping"
              continue
            fi

            # Warn if PATCH bump includes variable declaration changes
            BUMP_PART=$(echo "$NEW_VER" | cut -d. -f3)
            OLD_VER=$(git show ${{ inputs.base-ref }}:"$file" \
              | grep -oP '(?<=module_version = ")[^"]+' 2>/dev/null || echo "")
            if [ -n "$OLD_VER" ]; then
              OLD_PATCH=$(echo "$OLD_VER" | cut -d. -f3)
              OLD_MINOR=$(echo "$OLD_VER" | cut -d. -f2)
              NEW_MINOR=$(echo "$NEW_VER" | cut -d. -f2)
              OLD_MAJOR=$(echo "$OLD_VER" | cut -d. -f1)
              NEW_MAJOR=$(echo "$NEW_VER" | cut -d. -f1)
              if [ "$OLD_MAJOR" = "$NEW_MAJOR" ] && [ "$OLD_MINOR" = "$NEW_MINOR" ]; then
                # PATCH bump — check for variable changes
                VAR_CHANGES=$(git diff ${{ inputs.base-ref }}..HEAD -- "modules/$MODULE/" \
                  | grep '^+' | grep -c 'variable ' || echo "0")
                if [ "$VAR_CHANGES" -gt 0 ]; then
                  echo "::warning::PATCH bump for $MODULE includes variable declaration changes — verify backward compatibility"
                fi
              fi
            fi

            git tag -a "$TAG" -m "Release $MODULE v$NEW_VER" "${{ github.sha }}"
            echo "Created tag: $TAG"
            TAGS_CREATED="$TAGS_CREATED$TAG\n"
          done <<< "${{ steps.detect.outputs.changed-files }}"

          git push origin --tags
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf "$TAGS_CREATED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Module Tags Created" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.create-tags.outputs.tags }}" ]; then
            echo "${{ steps.create-tags.outputs.tags }}" | while read tag; do
              echo "- \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "_No module version bumps detected._" >> "$GITHUB_STEP_SUMMARY"
          fi
