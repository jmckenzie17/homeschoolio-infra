name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target-environment:
        description: Environment to promote to (staging or production)
        required: true
        type: choice
        options: [staging, production]

# Shared workflow version — update the version in each uses: line below to upgrade.
# Note: GitHub Actions does not support env vars in uses: fields; version must be literal.
# Current pinned version: v1.4.0
# NOTE: v1.4.0 adds pg_admin_password secret passthrough (jmckenzie17/homeschoolio-shared-actions#73).
# Verify this tag exists before merging this PR.

permissions:
  contents: write
  id-token: write

concurrency:
  group: cd-deployment
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Version Release
    if: github.event_name == 'push'
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/semver-release.yml@v1.4.0
    with:
      release-branch: main
      tag-prefix: "v"
    secrets: inherit

  dev-apply:
    name: Apply to dev
    needs: release
    if: >-
      github.event_name == 'push' &&
      needs.release.outputs.release-created == 'true'
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/apply.yml@v1.4.0
    with:
      target-environment: dev
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
      pg_admin_password: ${{ secrets.TF_VAR_PG_ADMIN_PASSWORD }}

  staging-apply:
    name: Apply to staging
    needs: [release, dev-apply]
    if: >-
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.target-environment == 'staging') ||
        (github.event_name == 'push' && needs.dev-apply.result == 'success')
      )
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/apply.yml@v1.4.0
    with:
      target-environment: staging
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
      pg_admin_password: ${{ secrets.TF_VAR_PG_ADMIN_PASSWORD }}

  production-apply:
    name: Apply to production
    needs: [release, staging-apply]
    if: >-
      always() &&
      needs.staging-apply.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target-environment == 'production'
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/apply.yml@v1.4.0
    with:
      target-environment: production
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
      pg_admin_password: ${{ secrets.TF_VAR_PG_ADMIN_PASSWORD }}
