name: CD

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target-environment:
        description: Environment to promote to (staging or production)
        required: true
        type: choice
        options: [staging, production]

# Shared workflow version — update the version in each uses: line below to upgrade.
# Note: GitHub Actions does not support env vars in uses: fields; version must be literal.
# Current pinned version: v1.3.5

concurrency:
  group: cd-deployment
  cancel-in-progress: false

jobs:
  get-release-version:
    name: Get release version
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag-name: ${{ steps.read.outputs.tag-name }}
      version: ${{ steps.read.outputs.version }}
    steps:
      - name: Download release metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read version outputs
        id: read
        run: |
          echo "tag-name=$(cat tag-name.txt)" >> "$GITHUB_OUTPUT"
          echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"

  dev-apply:
    name: Apply to dev
    needs: get-release-version
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/apply.yml@v1.3.5
    with:
      target-environment: dev
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  staging-apply:
    name: Apply to staging
    needs: dev-apply
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target-environment == 'staging') ||
      (needs.dev-apply.result == 'success')
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/apply.yml@v1.3.5
    with:
      target-environment: staging
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  production-apply:
    name: Apply to production
    needs: staging-apply
    if: |
      always() &&
      needs.staging-apply.result == 'success' &&
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target-environment == 'production')
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/apply.yml@v1.3.5
    with:
      target-environment: production
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
