name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Shared workflow version — update the version in each uses: line below to upgrade.
# Note: GitHub Actions does not support env vars in uses: fields; version must be literal.
# Current pinned version: v1.2.6

jobs:
  validate:
    name: Validate
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/validate.yml@v1.2.6
    secrets:
      backend-credentials: ${{ secrets.AZURE_CLIENT_ID }}

  test:
    name: Test
    needs: [validate, plan]
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/test.yml@v1.2.6
    with:
      plan-json-artifact: tfplan-json-${{ github.run_id }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  plan:
    name: Plan
    needs: validate
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/plan.yml@v1.2.6
    with:
      environments: "dev,staging,production"
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      backend-credentials: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  destructive-op-gate:
    name: Destructive Operation Gate
    needs: plan
    runs-on: ubuntu-latest
    if: needs.plan.outputs.has-destructive-ops == 'true' && github.event_name == 'pull_request'
    steps:
      - name: Check for destructive-op acknowledgment in PR body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.data.body || '';
            const acknowledged = body.includes('- [x] I acknowledge destructive operations in this plan');
            if (!acknowledged) {
              core.setFailed(
                'This plan contains destructive operations. Add the following line to your PR description and check the box:\n\n' +
                '- [x] I acknowledge destructive operations in this plan'
              );
            }
