name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  semver-release:
    name: Semantic Version Release
    uses: jmckenzie17/homeschoolio-shared-actions/.github/workflows/semver-release.yml@main
    with:
      release-branch: main
      tag-prefix: "v"
    secrets: inherit
